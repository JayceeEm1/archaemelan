<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charcoal Grey Shirt</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <h1>Product Details</h1>
            <div class="cart-icon">
                <img src="cart_icon.png" alt="Cart Icon">
            </div>
        </nav>
    </header>
    <main>
        <section class="product-detail">
            <h2>Charcoal Grey Shirt</h2>
            <img src="charcoal_grey_shirt.jpg" alt="Charcoal Grey Shirt Image">
            <p>A deep, versatile shade that balances modern edge with understated sophistication.</p>
            <div class="sizing-options">
                <label for="size">Choose a size:</label>
                <select id="size">
                    <option value="XS">XS</option>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>
            </div>
            <div class="quantity-selector">
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1">
            </div>
            <button class="add-to-cart">Add to Cart</button>
            <button class="buy-now">Buy Now</button>
        </section>
    </main>
</body>
</html>
