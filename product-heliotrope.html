<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Heliotrope Shirt</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#"><img src="cart-icon.png" alt="Cart"></a></li>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Old Heliotrope Shirt</h1>
        <img src="old-heliotrope-shirt.jpg" alt="Old Heliotrope Shirt">
        <p>A rich purple hue with vintage character, perfect for standing out subtly.</p>
        <div class="sizing-options">
            <label for="size">Size:</label>
            <select id="size">
                <option value="small">Small</option>
                <option value="medium">Medium</option>
                <option value="large">Large</option>
                <option value="extra-large">Extra Large</option>
            </select>
        </div>
        <div class="quantity-selector">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1">
        </div>
        <div class="buttons">
            <button id="add-to-cart">Add to Cart</button>
            <button id="buy-now">Buy Now</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Old Heliotrope. All rights reserved.</p>
    </footer>
</body>
</html>
