<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream Shirt Detail</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">My Store</div>
            <div class="cart-icon">
                <img src="cart-icon.png" alt="Cart">
            </div>
        </nav>
    </header>
    <main>
        <h1>Cream Shirt</h1>
        <img src="cream-shirt.jpg" alt="Cream Shirt" class="product-image">
        <p>Soft and refined, this neutral tone brings effortless warmth to any look.</p>
        <div class="sizing-options">
            <label for="size">Choose Size:</label>
            <select id="size">
                <option value="s">Small</option>
                <option value="m">Medium</option>
                <option value="l">Large</option>
                <option value="xl">Extra Large</option>
            </select>
        </div>
        <div class="quantity-selector">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1">
        </div>
        <button class="add-to-cart">Add to Cart</button>
        <button class="buy-now">Buy Now</button>
    </main>
    <footer>
        <p>&copy; 2026 My Store. All rights reserved.</p>
    </footer>
</body>
</html>
