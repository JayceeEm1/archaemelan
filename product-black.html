<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shirt Detail</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="cart-icon">
                <img src="cart-icon.png" alt="Cart">
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Black Shirt</h1>
        <img src="black-shirt.jpg" alt="Black Shirt" class="product-image">
        <p>Timeless and bold, the ultimate staple that pairs seamlessly with everything.</p>
        <h2>Sizing Options</h2>
        <select id="size">
            <option value="s">Small</option>
            <option value="m">Medium</option>
            <option value="l">Large</option>
            <option value="xl">Extra Large</option>
        </select>
        <h2>Quantity</h2>
        <input type="number" id="quantity" value="1" min="1">
        <button id="add-to-cart">Add to Cart</button>
        <button id="buy-now">Buy Now</button>
    </main>

    <footer>
        <p>&copy; 2026 JayceeEm1</p>
    </footer>
</body>
</html>
